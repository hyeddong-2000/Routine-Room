spring:
  application:
    name: routine-room
  datasource:
    url: jdbc:postgresql://localhost:5432/routineroom
    username: ${DB_USERNAME:root}
    password: "${DB_PASSWORD:qhdks00!!}"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

jwt:
  secret: ${JWT_SECRET:routineroom-secret-key-256bit-for-hs256-algorithm-only}
  expiration: 86400000

server:
  port: 8080

logging:
  level:
    com.routineroom: DEBUG
    org.mybatis: DEBUG
